<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הזמנה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --ew:440px; --eh:270px; --ch:540px; --show:390px;
  --apex:220px;
  --c1:#A8C49E; --c2:#98B48E; --c3:#88A47E;
  --gold:#7A9A6A; --gold-l:#B8D4A8;
  --bg:#181008;
}

body{background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Heebo',sans-serif}

/* Stars */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:var(--gold-l);opacity:0;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--op,.25)}}

/* Scene */
.scene{position:relative;z-index:10;width:var(--ew);height:calc(var(--show) + var(--eh));cursor:pointer}

/* Card */
.card-wrap{position:absolute;top:0;left:20px;right:20px;height:var(--ch);opacity:0;transform:translateY(calc(var(--ch) - 30px));z-index:6;transition:none}
.card-wrap.rising{opacity:1;transform:translateY(0);transition:transform .95s cubic-bezier(.34,1.06,.64,1) .5s,opacity .25s ease .5s}
.card{width:100%;height:100%;background:#fff;border-radius:3px;overflow:hidden;position:relative;box-shadow:0 -10px 40px rgba(0,0,0,.4)}
.card img{width:100%;height:100%;object-fit:cover;display:block}

/* Details button */
.details-btn{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(40,28,12,.85);color:#E8D5A3;border:none;border-radius:25px;padding:.85rem 2.6rem;font-family:'Heebo',sans-serif;font-size:1.15rem;letter-spacing:.08em;cursor:pointer;opacity:0;transition:opacity .4s ease .3s;white-space:nowrap;z-index:7}
.details-btn.visible{opacity:1}

/* Envelope */
.env-outer{position:absolute;bottom:0;left:0;right:0;height:var(--eh);z-index:3;transition:transform .78s cubic-bezier(.4,0,.2,1)}
.env-outer.down{transform:translateY(75px)}
.env-shadow{position:absolute;inset:0;pointer-events:none;filter:drop-shadow(0 24px 65px rgba(0,0,0,.78));z-index:0}
.env-shadow svg{width:100%;height:100%;display:block}
.env-body{position:absolute;inset:0;z-index:1}
.env-body svg{width:100%;height:100%;display:block}
.flap-persp{position:absolute;top:0;left:0;right:0;height:var(--apex);perspective:1100px;z-index:5}
.flap-inner{position:absolute;inset:0;transform-origin:top center;transition:transform .88s cubic-bezier(.42,0,.28,1);filter:drop-shadow(0 7px 18px rgba(0,0,0,.32))}
.flap-inner.open{transform:rotateX(-87deg)}
.flap-shape{position:absolute;inset:0;background:var(--c2);clip-path:polygon(0% 0,100% 0,50% 100%)}

/* Main popup */
.popup-overlay{position:fixed;inset:0;background:rgba(10,6,2,.55);z-index:50;display:none;align-items:flex-end;justify-content:center}
.popup-overlay.show{display:flex}
.popup{background:#F7F2E8;border-radius:18px 18px 0 0;padding:1.6rem 1.8rem 2.2rem;width:100%;max-width:480px;transform:translateY(100%);transition:transform .45s cubic-bezier(.34,1.08,.64,1);font-family:'Heebo',sans-serif;direction:rtl}
.popup-overlay.show .popup{transform:translateY(0)}
.popup-handle{width:36px;height:4px;background:#C8B89A;border-radius:2px;margin:0 auto 1.4rem}
.popup-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:#2C2018;text-align:center;margin-bottom:1.2rem}
.popup-row{display:flex;align-items:flex-start;gap:.75rem;padding:.65rem 0;border-bottom:1px solid rgba(180,160,120,.2)}
.popup-row:last-child{border-bottom:none}
.popup-icon{display:flex;align-items:center;flex-shrink:0;padding-top:.1rem}
.popup-label{font-size:.72rem;color:#9A8060;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.1rem}
.popup-value{font-size:.95rem;color:#3A2C1A;line-height:1.4}
.popup-missing{font-size:.88rem;color:#B09070;font-style:italic}
.popup-close{margin-top:1.4rem;width:100%;padding:.75rem;background:#3A2C1A;color:#E8D5A3;border:none;border-radius:10px;font-family:'Heebo',sans-serif;font-size:.9rem;cursor:pointer;letter-spacing:.05em}

/* Dress popup */
#dressOverlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:none;align-items:center;justify-content:center}
#dressOverlay .inner{max-width:90vw;max-height:90vh;position:relative}
#dressOverlay img{max-width:90vw;max-height:88vh;border-radius:12px;display:block}
#dressOverlay button{position:absolute;top:-14px;left:-14px;width:32px;height:32px;border-radius:50%;background:#3A2C1A;color:#E8D5A3;border:none;font-size:1rem;cursor:pointer;line-height:1}

/* Confetti */
.cp{position:fixed;top:50%;left:50%;pointer-events:none;z-index:100;opacity:0}
@keyframes fly{0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) rotate(var(--rot)) scale(.3)}}
</style>
</head>

<script>
let opened = false;

function openEnvelope() {
  if (opened) return;
  opened = true;
  document.getElementById('scene').style.cursor = 'default';
  document.getElementById('flap').classList.add('open');
  setTimeout(() => document.getElementById('envOuter').classList.add('down'), 220);
  setTimeout(() => {
    document.getElementById('cardWrap').classList.add('rising');
    confetti();
    setTimeout(() => document.getElementById('detailsBtn').classList.add('visible'), 900);
  }, 550);
}

function openPopup()  { document.getElementById('popupOverlay').classList.add('show'); }
function closePopup() { document.getElementById('popupOverlay').classList.remove('show'); }
function openDressPopup()  { document.getElementById('dressOverlay').style.display='flex'; }
function closeDressPopup() { document.getElementById('dressOverlay').style.display='none'; }

function confetti() {
  const cols=['#C8A96E','#E8D5A3','#C4816A','#FDF6EC','#D4A5A0','#9A7A30'];
  for(let i=0;i<55;i++){
    const el=document.createElement('div');
    el.className='cp';
    const a=Math.random()*360,d=160+Math.random()*260;
    el.style.cssText=`background:${cols[i%cols.length]};--tx:${Math.cos(a*Math.PI/180)*d}px;--ty:${Math.sin(a*Math.PI/180)*d-80}px;--rot:${Math.random()*720-360}deg;border-radius:${Math.random()>.5?'50%':'2px'};width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;animation:fly ${.7+Math.random()*.7}s ease-out forwards;animation-delay:${Math.random()*.25}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1600);
  }
}

(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<85;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()>.85?2.5:Math.random()>.5?1.5:1;
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--d:${2+Math.random()*4}s;--delay:${Math.random()*6}s;--op:${.12+Math.random()*.3};`;
    c.appendChild(s);
  }
})();
</script>
